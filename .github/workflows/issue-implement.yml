name: implement-issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # Serialize per issue — agents racing each other on the same spec produce
  # conflicting branches.
  group: implement-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    if: github.event.label.name == 'agent:implement'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ISSUE: ${{ github.event.issue.number }}
      BRANCH: agent/issue-${{ github.event.issue.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Detect stack
        id: stack
        run: |
          if [[ -f .harness-stack ]]; then
            echo "stack=$(cat .harness-stack)" >> "$GITHUB_OUTPUT"
          else
            echo "no stack installed"; exit 1
          fi

      # Stack-specific setup — mirrors .github/workflows/harness.yml.
      - if: steps.stack.outputs.stack == 'typescript'
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - if: steps.stack.outputs.stack == 'typescript'
        run: npm ci

      - if: steps.stack.outputs.stack == 'python'
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - if: steps.stack.outputs.stack == 'python'
        run: |
          pip install -e .
          pip install ruff mypy pytest pytest-cov vulture pip-audit semgrep

      - if: steps.stack.outputs.stack == 'go'
        uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - if: steps.stack.outputs.stack == 'go'
        run: |
          go mod download
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin"

      - if: steps.stack.outputs.stack == 'laravel'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov
          tools: composer:v2
      - if: steps.stack.outputs.stack == 'laravel'
        run: composer install --no-progress --prefer-dist

      - run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure git and create branch
        run: |
          git config user.name "harness-bot"
          git config user.email "harness-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"

      - name: Implement
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are implementing GitHub issue #${{ github.event.issue.number }}.

            ## Title
            ${{ github.event.issue.title }}

            ## Spec
            ${{ github.event.issue.body }}

            ## Workflow

            1. Read AGENTS.md, docs/architecture.md, and docs/conventions.md before touching code.
            2. State your plan in 2–3 sentences: which layer (core/adapters/app/interface)
               does each new symbol belong to, and which acceptance criterion does each test cover.
            3. Write the code and the regression tests.
            4. Run `./scripts/harness-check.sh`. If anything fails, fix the underlying issue
               (do not disable rules to make sensors pass). Iterate up to 8 rounds.
            5. When the harness is green, commit each logical change with a message starting
               `feat:` / `fix:` / `refactor:` / `test:`. Do NOT push — the workflow handles that.

            ## Constraints

            - The harness is authoritative. Don't suppress checks; fix root causes.
            - Stay within the architecture invariants — boundary violations fail the build.
            - If the spec is ambiguous on something material, stop and write a single-paragraph
              summary of what's blocking; do not guess. Exit without committing.
            - Do not write documentation files unless the spec explicitly asks for them.

      - name: Push and open PR (or comment failure)
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -n "$(git log origin/main..HEAD --oneline 2>/dev/null)" ]]; then
            git push -u origin "$BRANCH"
            pr_body=$(cat <<EOF
          Closes #$ISSUE.

          Generated by the harness-bot from the spec in the issue. The harness was green at commit time. Claude + Codex review run on this PR via .github/workflows/review.yml.
          EOF
          )
            gh pr create \
              --title "$(git log -1 --pretty=%s)" \
              --body "$pr_body" \
              --label "agent:generated" \
              --head "$BRANCH" \
              --base main
          else
            gh issue comment "$ISSUE" --body "Agent did not produce any commits — likely the spec was ambiguous or the harness couldn't be made green within the iteration budget. See the [workflow run]($RUN_URL) for diagnostics."
          fi
