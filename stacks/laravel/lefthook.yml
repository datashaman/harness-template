# Pre-commit / pre-push hooks for the laravel stack.
# Install once with `lefthook install`. https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    format-php:
      glob: "*.{php,blade.php}"
      run: ./vendor/bin/pint --test {staged_files}

    format-js:
      # Laravel ships resources/js + resources/css + Vite config. Prettier is
      # optional — a fresh `composer create-project laravel/laravel` doesn't
      # include it. When it's installed (npm i -D prettier), this fires; when
      # it isn't, the step no-ops so committers without Node aren't blocked.
      glob: "*.{js,mjs,cjs,ts,tsx,jsx,vue,svelte,css,scss,sass,html,json,yml,yaml,md}"
      run: |
        if [[ -x ./node_modules/.bin/prettier ]]; then
          ./node_modules/.bin/prettier --check {staged_files}
        fi

    lint-js:
      glob: "*.{js,mjs,cjs,ts,tsx,jsx,vue,svelte}"
      run: |
        if [[ -x ./node_modules/.bin/eslint ]]; then
          ./node_modules/.bin/eslint --max-warnings 0 {staged_files}
        fi

    policy:
      glob: "*.{php,js,mjs,cjs,ts,tsx,jsx,vue}"
      run: |
        if command -v semgrep >/dev/null; then
          semgrep --config harness/policies/ --error {staged_files}
        fi

pre-push:
  commands:
    harness:
      run: ./scripts/harness-check.sh
